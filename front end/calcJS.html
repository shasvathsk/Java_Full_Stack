<html>
<body>
<div id="demo">
<button onClick="add()">add</button>
<button onClick="sub()">sub</button>
<button onClick="mul()">mul</button>
<button onClick="div()">div</button>
<button onClick="quo()">quo</button>
<script>
let a=1
let b=2

function add(){
document.write(a+b)
}

function sub(){
document.write(a-b)
}

function mul(){
document.write(a*b)
}

function div(){
document.write(a/b)
}

function quo(){
document.write(a%b)
}

</script>
</div>
</body>
</html>
